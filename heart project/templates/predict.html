<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heart Disease Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


  <style>
    body {

  /* background-image:url(/static/bg.jpeg);
  background-size: cover; */
  /* background: #f5f5f5; */
}
  </style>
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Heart Disease Prediction System</h2>

  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST" class="card p-4 shadow-sm">
    <div class="row g-3">
      {% for f in features %}
        <div class="col-md-6">
          <label class="form-label fw-bold">{{ f }}</label>
          <input type="number" 
                 class="form-control" 
                 name="{{ f }}" 
                 required
                 {% if feature_info[f].min is defined %} min="{{ feature_info[f].min }}" {% endif %}
                 {% if feature_info[f].max is defined %} max="{{ feature_info[f].max }}" {% endif %}
                 {% if feature_info[f].step is defined %} step="{{ feature_info[f].step }}" {% else %} step="1" {% endif %}>
          <small class="text-muted">
            Range: {{ feature_info[f].min }} – {{ feature_info[f].max }}
          </small>
        </div>
      {% endfor %}
    </div>
    <button type="submit" class="btn btn-success mt-4 w-100">Predict</button>
  </form>
  <div class="text-center mt-3">
    <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">Logout</a>
  </div>
</div>

</body>
</html>
